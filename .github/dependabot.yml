version: 2
updates:
  # npm dependencies — group minor + patch into a single PR each week so the
  # review surface stays small. Major bumps still come as their own PR.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    # Don't auto-bump these on majors — they're load-bearing or have known
    # breaking-change patterns, and benefit from human review.
    ignore:
      - dependency-name: next
        update-types: [version-update:semver-major]
      - dependency-name: react
        update-types: [version-update:semver-major]
      - dependency-name: react-dom
        update-types: [version-update:semver-major]
      - dependency-name: "@circle-fin/developer-controlled-wallets"
        update-types: [version-update:semver-major]
      # lucide-react v1 dropped brand icons (Github, Twitter, etc.) — any 0.x
      # → 1.x bump will break our header. Upgrade manually when we have a
      # replacement plan for the icon.
      - dependency-name: lucide-react
        update-types: [version-update:semver-major]

  # Keep workflow action versions current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
